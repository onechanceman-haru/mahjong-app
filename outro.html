<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  html,body{width:1080px;height:1920px;overflow:hidden;}
  body{
    font-family:"Yu Gothic","Hiragino Kaku Gothic ProN",Meiryo,sans-serif;
    background:linear-gradient(160deg,#0f5132 0%,#137a4a 45%,#1aa05f 100%);
    color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:90px 70px;
  }
  .tiles{font-size:90px;letter-spacing:10px;margin-bottom:30px;}
  .thanks{font-size:62px;font-weight:900;line-height:1.4;text-shadow:0 3px 10px rgba(0,0,0,.3);margin-bottom:60px;}
  .lead{font-size:40px;font-weight:700;margin-bottom:22px;color:#ffd23f;}
  .urlbox{
    background:#fff;color:#0f5132;font-weight:900;font-size:34px;
    padding:30px 28px;border-radius:22px;word-break:break-all;line-height:1.4;
    box-shadow:0 12px 30px rgba(0,0,0,.3);margin-bottom:55px;width:100%;
  }
  .tip{font-size:34px;line-height:1.7;margin-bottom:55px;color:rgba(255,255,255,.95);}
  .tip b{color:#ffd23f;}
  .bye{font-size:54px;font-weight:900;margin-bottom:24px;text-shadow:0 3px 10px rgba(0,0,0,.3);}
  .by{font-size:30px;color:rgba(255,255,255,.85);}
</style>
</head>
<body>
  <div class="tiles">🀄 🀇 🀙 🀄</div>
  <div class="thanks">ご視聴<br>ありがとうございました！</div>
  <div class="lead">アプリはこちら 👇</div>
  <div class="urlbox">onechanceman-haru.github.io/mahjong-app</div>
  <div class="tip">スマホでURLを開く →<br><b>ホーム画面に追加</b>すると便利！<br><br>質問・エラー報告は<br><b>グループLINE</b>へ</div>
  <div class="bye">それでは、良い半荘を！🀄</div>
  <div class="by">公大中麻雀倶楽部　代表　ワンチャンマン</div>
</body>
</html>
